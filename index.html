<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة الفرص | Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<aside id="sidebar">
<div class="sidebar-header">
<h3></h3>
</div>
<nav>
<div class="nav-item active" data-page="dashboard-page">الرئيسية</div>
<div class="nav-item" data-page="reports-page">التقارير</div>
</nav>
</aside>

<main id="main-content">
<header>
<button id="toggle-sidebar">☰</button>
<h2 id="page-title"></h2>
</header>

<section id="dashboard-page" class="page active">
<div class="kpi-container">
<div class="card">
<p>إجمالي الفرص</p>
<h2 id="total-count">0</h2>
</div>
<div class="card">
<p>القيمة التقديرية</p>
<h2 id="total-value">0</h2>
</div>
</div>

<div class="chart-container card">
<h3>توزيع الحالات</h3>
<canvas id="statusChart"></canvas>
</div>
</section>

<section id="reports-page" class="page">
    <div class="filter-section card">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="بحث  ...">
        </div>
        <div class="filter-pills">
            <button class="filter-btn active" id="btnAll" onclick="resetFilters()">الكل</button>
            <select id="monthFilter">
                <option value="all">اختر الشهر لفلترة البيانات...</option>
            </select>
        </div>
    </div>

    <div class="table-container card">
        <table id="reportsTable">
            <thead id="tableHeader"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</section>
</main>

<script src="script.js"></script>
</body>
</html>
